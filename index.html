<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Yappy Bug Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styl.css">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-logo">
            <h2>Yappy TRACKER</h2>
        </div>
        
        <nav class="nav-menu d-flex flex-column">
            <a href="#" id="btn-dashboard" class="nav-link active"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
            <a href="#" id="btn-issues" class="nav-link"><i class="bi bi-bug me-2"></i> Issues</a>
            <a href="#" id="btn-people" class="nav-link"><i class="bi bi-people me-2"></i> People</a>
            <a href="#" id="btn-projects" class="nav-link"><i class="bi bi-folder me-2"></i> Projects</a>
        </nav>
    </aside>

    <div class="main-content">
        <header class="header">
            <div class="search-bar">
                <i class="bi bi-search"></i>
                <input type="text" placeholder="Search bugs...">
            </div>
            
            <div class="header-right">
                <button class="add-btn btn">+ New Ticket</button>
                <div class="profile">
                    <span class="me-2 text-muted">Admin</span>
                    <div class="avatar"></div>
                </div>
            </div>
        </header>

        <section class="page-body">
        
            <div id="dashboard-content" class="view-section">
                <div class="stats_container">

                    <div class="total_stats">
                        <span class="stat-label">TOTAL ISSUES</span>
                        <div class="stat-value">24</div>
                    </div>

                    <div class="open_stats">
                        <span class="stat-label">OPEN</span>
                        <div class="stat-value">04</div>                    
                    </div>

                    <div class="resolved_stats">
                        <span class="stat-label">RESOLVED</span>
                        <div class="stat-value">12</div>                    
                    </div>

                    <div class="overdue_stats">
                        <span class="stat-label">OVERDUE</span>
                        <div class="stat-value">08</div>                    
                    </div>

                </div>                
    
                <div class="table-container">
                    <h5 class="section-title">Recent Issues</h5>
                    <div class="table-scroll">
                        <table>
                            <thead>
                                <tr>
                                    <th>Summary</th>
                                    <th>Project</th>
                                    <th>Priority</th>
                                    <th>Status</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody id="recentIssuesTable">
                                </tbody>
                        </table>
                    </div>
                </div>

                <div class="chart-container-box">
                    <h5 class="section-title">Priority Distribution</h5>
                    <div class="canvas-wrapper">
                        <canvas id="donut_chart"></canvas>
                    </div>
                </div>

            </div>

            <div id="issues-content" class="view-section hidden">
               <p>This is the issue page</p>
            </div>



            <div id="people-content" class="view-section hidden">
               <p>This is the issue page</p>
            </div>



            <div id="projects-content" class="view-section hidden">
               <p>This is the issue page</p>
            </div>


        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
