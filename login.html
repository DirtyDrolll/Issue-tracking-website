<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Yappy Tracker</title>
    <style>
        body {
            background: #0f172a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .login-box {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
            display: flex;
           flex-direction: column;
           gap: 15px;
        }

        .btn-login {
            width: 100%;
        }

.login-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
}
      
.login-form input {
    padding: 10px;
    border: none;
    border-radius: 6px;
    outline: none;
    font-size: 14px;
}

.login-btn {
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: #3b82f6;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s ease;
}

.login-btn:hover {
    background: #2563eb;
    transform: scale(1.03);
}

#errorMsg {
    color: #f87171;
    font-size: 14px;
}
    </style>
</head>
<body>

<div class="login-box">
    <h2>Yappy Tracker</h2>

    <form id="loginForm" class="login-form">
    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>

    <button type="submit" class="login-btn">Login</button>
</form>

<p id="errorMsg"></p>
</div>

<script>
    const form = document.getElementById('loginForm');

    form.addEventListener('submit', function(e) {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        if (username === "admin" && password === "1234") {
            localStorage.setItem("loggedIn", "true");

            window.location.href = "index.html";
        } else {
            document.getElementById('errorMsg').innerText = "Invalid login details";
        }
    });
</script>

</body>
</html>
